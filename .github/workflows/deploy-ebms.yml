# EBMS — Cloudflare Worker + Pages deploy
# TDD-EBMS-2025-001

name: Deploy EBMS to Cloudflare

on:
  push:
    branches: [main]
    paths:
      - 'apps/ebms-worker/**'
      - 'apps/ebms-web/**'
      - '.github/workflows/deploy-ebms.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-ebms
  cancel-in-progress: true

jobs:
  deploy-worker:
    name: Deploy Worker (API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.EBMS_CF_API_TOKEN }}
          accountId: ${{ secrets.EBMS_CF_ACCOUNT_ID }}
          command: deploy
          workingDirectory: apps/ebms-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.EBMS_CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.EBMS_CF_ACCOUNT_ID }}

  deploy-pages:
    name: Deploy Pages (Frontend)
    runs-on: ubuntu-latest
    needs: deploy-worker
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build Next.js
        run: npm run build --workspace=ebms-web

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@1
        with:
          apiToken: ${{ secrets.EBMS_CF_API_TOKEN }}
          accountId: ${{ secrets.EBMS_CF_ACCOUNT_ID }}
          projectName: ebms-web
          directory: apps/ebms-web/out
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.EBMS_CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.EBMS_CF_ACCOUNT_ID }}
