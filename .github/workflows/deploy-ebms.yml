# EBMS — Cloudflare Worker + Pages deploy
# TDD-EBMS-2025-001

name: Deploy EBMS to Cloudflare

on:
  push:
    branches: [main]
    paths:
      - "apps/ebms-worker/**"
      - "apps/ebms-web/**"
      - ".github/workflows/deploy-ebms.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write # Pages action needs this for GitHub Deployments

concurrency:
  group: deploy-ebms
  cancel-in-progress: true

jobs:
  deploy-worker:
    name: Deploy Worker (API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci

      - name: Deploy Worker
        run: npm run deploy --workspace=ebms-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.EBMS_CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.EBMS_CF_ACCOUNT_ID }}

  deploy-pages:
    name: Deploy Pages (Frontend)
    runs-on: ubuntu-latest
    needs: deploy-worker
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build Next.js
        run: npm run build --workspace=ebms-web
        env:
          NEXT_PUBLIC_API_URL: https://ebms-api.myagmartsognnaranbaatar.workers.dev

      - name: Deploy to Cloudflare Pages
        run: |
          for attempt in 1 2 3; do
            npm exec wrangler pages deploy apps/ebms-web/out --project-name=ebms-web && exit 0
            if [ "$attempt" -lt 3 ]; then
              echo "Cloudflare Pages deploy failed on attempt $attempt. Retrying in 15 seconds..."
              sleep 15
            fi
          done
          echo "Cloudflare Pages deploy failed after 3 attempts."
          exit 1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.EBMS_CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.EBMS_CF_ACCOUNT_ID }}
